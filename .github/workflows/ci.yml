name: DevOps Final CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test-and-validate:
    name: Test, lint, validate, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Validate environment automation
        run: npm run validate

      - name: Run local security validation
        run: npm run security

      - name: Build release artifact
        run: npm run build

  secrets-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build -t devops-task-board:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: devops-task-board:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  compose-smoke-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for application health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Verify metrics endpoint
        run: |
          curl --fail --silent http://localhost:3000/metrics | grep app_requests_total

      - name: Verify Prometheus target
        run: |
          curl --fail --silent http://localhost:9090/-/ready

      - name: Stop stack
        if: always()
        run: docker compose down --volumes
