<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Deployment proof</title>
  <desc id="desc">Output showing blue-green deployment and rollback.</desc>
  <rect width="1100" height="560" fill="#f6f8f9"/>
  <rect x="36" y="32" width="1028" height="480" rx="8" fill="#17212b"/>
  <text x="68" y="78" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Blue-Green Deployment and Rollback</text>
  <text x="68" y="128" fill="#55d68b" font-family="Consolas, monospace" font-size="19">$ node scripts/deploy.js</text>
  <text x="68" y="166" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Deployed 1.0.0 to blue environment.</text>
  <text x="68" y="198" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Active slot is now blue.</text>
  <text x="68" y="250" fill="#55d68b" font-family="Consolas, monospace" font-size="19">$ node scripts/deploy.js</text>
  <text x="68" y="288" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Deployed 1.0.0 to green environment.</text>
  <text x="68" y="320" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Active slot is now green.</text>
  <text x="68" y="352" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Previous slot available for rollback: blue.</text>
  <text x="68" y="404" fill="#55d68b" font-family="Consolas, monospace" font-size="19">$ node scripts/rollback.js</text>
  <text x="68" y="442" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Rollback completed. Active slot is now blue.</text>
  <text x="68" y="474" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Former active slot kept as rollback target: green.</text>
</svg>
