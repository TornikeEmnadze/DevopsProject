<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">CI pipeline proof</title>
  <desc id="desc">GitHub Actions workflow and local CI-equivalent verification output.</desc>
  <rect width="1100" height="520" fill="#f6f8f9"/>
  <rect x="36" y="32" width="1028" height="456" rx="8" fill="#17212b"/>
  <text x="68" y="78" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">CI Pipeline: test-and-lint</text>
  <text x="68" y="118" fill="#9fb2c0" font-family="Consolas, monospace" font-size="20">Trigger: push and pull_request on main/dev</text>
  <text x="68" y="166" fill="#55d68b" font-family="Consolas, monospace" font-size="19">$ npm test</text>
  <text x="68" y="202" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">PASS test/app.test.js</text>
  <text x="68" y="234" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">tests 3 | pass 3 | fail 0</text>
  <text x="68" y="286" fill="#55d68b" font-family="Consolas, monospace" font-size="19">$ npm run lint</text>
  <text x="68" y="322" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">Lint passed.</text>
  <text x="68" y="376" fill="#55d68b" font-family="Consolas, monospace" font-size="19">Workflow file</text>
  <text x="68" y="412" fill="#dbe7ee" font-family="Consolas, monospace" font-size="18">.github/workflows/ci.yml</text>
  <text x="68" y="444" fill="#9fb2c0" font-family="Consolas, monospace" font-size="16">After pushing, the live Actions run appears in the repository Actions tab.</text>
</svg>
